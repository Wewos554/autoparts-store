<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AutoParts Store - автозапчасти</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <nav id="global-nav"></nav>
    <h1>Каталог автозапчастей</h1>
    
    <!-- Поиск -->
    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или бренду">
      
      <!-- Фильтры -->
      <select id="categoryFilter">
        <option value="">Все категории</option>
        <option value="Двигатель">Двигатель</option>
        <option value="Тормозная система">Тормозная система</option>
        <option value="Подвеска">Подвеска</option>
        <option value="Электрика">Электрика</option>
      </select>
      
      <input type="number" id="maxPrice" placeholder="Макс. цена">
      
      <!-- Сортировка -->
      <select id="sortBy">
        <option value="date">По дате (новые)</option>
        <option value="priceAsc">Цена (по возрастанию)</option>
        <option value="priceDesc">Цена (по убыванию)</option>
      </select>
      
      <button id="applyFiltersBtn">Применить</button>
    </div>
    
    <div id="itemsList"></div>
    
    <!-- Пагинация -->
    <div class="pagination">
      <button id="loadMoreBtn" class="load-more">Загрузить ещё</button>
    </div>
  </div>
  
  <script src="/js/common.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
