<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AutoParts Store - автозапчасти</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <nav>
      <a href="/">Главная</a>
      <a href="/auth/login">Войти</a>
      <a href="/auth/register">Регистрация</a>
    </nav>
    <h1>Каталог автозапчастей</h1>
    <div id="itemsList"></div>
  </div>
  <script src="/js/common.js"></script>
  <script>
    async function loadPublicItems() {
      try {
        const items = await apiRequest('/items');
        const container = document.getElementById('itemsList');
        container.innerHTML = items.map(item => `
          <div class="card">
            <h3>${item.name}</h3>
            <p>Бренд: ${item.brand}</p>
            <p>Категория: ${item.category}</p>
            <p>Цена: ${item.price} ₽</p>
          </div>
        `).join('');
      } catch(err) {
        document.getElementById('itemsList').innerHTML = '<p>Ошибка загрузки товаров</p>';
      }
    }
    loadPublicItems();
  </script>
</body>
</html>
